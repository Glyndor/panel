name: release-agent

on:
  push:
    tags:
      - "agent@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. agent@1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    name: Verify sqlx cache
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx_ci
          POSTGRES_PASSWORD: lynx_ci
          POSTGRES_DB: lynx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        env:
          DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci
        run: sqlx migrate run --source agent/migrations

      - name: Verify sqlx cache is up-to-date
        env:
          DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci
        run: cargo sqlx prepare --check -- --package lynx-agent

  ci:
    name: CI checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx_ci
          POSTGRES_PASSWORD: lynx_ci
          POSTGRES_DB: lynx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: lynx

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run agent migrations
        run: sqlx migrate run --source agent/migrations

      - name: fmt
        run: cargo fmt --package lynx-agent -- --check

      - name: clippy
        run: cargo clippy --package lynx-agent -- -D warnings

      - name: test
        run: cargo test --package lynx-agent --bin lynx-agent

      - name: audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  build:
    name: Build ${{ matrix.arch }}
    needs: [prepare, ci]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust-target: x86_64-unknown-linux-musl
            use_cross: false

          - arch: arm64
            rust-target: aarch64-unknown-linux-musl
            use_cross: true

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install musl toolchain (x86_64)
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get install -y musl-tools

      - name: Install cross (arm64)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build agent (musl static)
        env:
          SQLX_OFFLINE: "true"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release \
              --package lynx-agent \
              --target ${{ matrix.rust-target }}
          else
            cargo build --release \
              --package lynx-agent \
              --target ${{ matrix.rust-target }}
          fi

      - name: Sign agent binary
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          pip install --quiet cryptography
          BINARY="lynx/target/${{ matrix.rust-target }}/release/lynx-agent"
          ARTIFACT="lynx-agent-linux-${{ matrix.arch }}"
          cp "$BINARY" "$ARTIFACT"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$ARTIFACT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-${{ matrix.arch }}
          path: |
            lynx-agent-linux-${{ matrix.arch }}
            lynx-agent-linux-${{ matrix.arch }}.sig
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            lynx-agent-linux-x86_64 \
            lynx-agent-linux-x86_64.sig \
            lynx-agent-linux-arm64 \
            lynx-agent-linux-arm64.sig
