name: release-agent-test

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            rust-target: x86_64-unknown-linux-musl
            use_cross: false
          - arch: arm64
            rust-target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - run: echo "arch=${{ matrix.arch }} use_cross=${{ matrix.use_cross }}"
      - run: touch "artifact-${{ matrix.arch }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: art-${{ matrix.arch }}
          path: artifact-${{ matrix.arch }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifact-x86_64
            artifact-arm64
