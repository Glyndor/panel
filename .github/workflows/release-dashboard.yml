name: release-dashboard

on:
  push:
    tags:
      - "dashboard@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. dashboard@1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    name: Verify sqlx cache
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: lynx_dashboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:ci_test@localhost:5432/lynx_dashboard
        run: sqlx migrate run --source dashboard/server/migrations

      - name: Verify sqlx cache is up-to-date
        env:
          DATABASE_URL: postgresql://postgres:ci_test@localhost:5432/lynx_dashboard
        run: cargo sqlx prepare --check -- -p lynx-dashboard-server

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust-target: x86_64-unknown-linux-musl
            bun-target: bun-linux-x64-musl
            use_cross: false

          - arch: arm64
            rust-target: aarch64-unknown-linux-musl
            bun-target: bun-linux-arm64-musl
            use_cross: true

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # --- Rust backend -------------------------------------------------------

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install musl toolchain (x86_64)
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get install -y musl-tools

      - name: Install cross (arm64)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build backend (musl static)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release \
              --package lynx-dashboard-server \
              --target ${{ matrix.rust-target }}
          else
            cargo build --release \
              --package lynx-dashboard-server \
              --target ${{ matrix.rust-target }}
          fi
        env:
          SQLX_OFFLINE: "true"

      - name: Sign backend binary
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          pip install --quiet cryptography
          BINARY="lynx/target/${{ matrix.rust-target }}/release/lynx-dashboard-server"
          ARTIFACT="lynx-dashboard-backend-linux-${{ matrix.arch }}"
          cp "$BINARY" "$ARTIFACT"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$ARTIFACT"

      # --- Frontend -----------------------------------------------------------

      - name: Install bun (x64 for execution)
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/oven-sh/bun/releases/latest" \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          BASE_URL="https://github.com/oven-sh/bun/releases/download/${VERSION}"
          curl -sL "${BASE_URL}/bun-linux-x64-musl.zip" -o bun.zip
          curl -sL "${BASE_URL}/SHASUMS256.txt" -o SHASUMS256.txt
          grep "bun-linux-x64-musl.zip" SHASUMS256.txt | sha256sum -c -
          unzip -q bun.zip
          sudo mv "bun-linux-x64-musl/bun" /usr/local/bin/bun
          bun --version

      - name: Install frontend deps
        working-directory: lynx/dashboard/ui
        run: bun install --frozen-lockfile

      - name: Build Next.js (standalone)
        working-directory: lynx/dashboard/ui
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Compile standalone binary
        working-directory: lynx/dashboard/ui
        run: |
          bun build --compile \
            --target ${{ matrix.bun-target }} \
            .next/standalone/server.js \
            --outfile "lynx-dashboard-frontend-linux-${{ matrix.arch }}"

      - name: Bundle static assets
        working-directory: lynx/dashboard/ui
        run: |
          TARBALL="lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" \
            -C .next/standalone \
            .next/static \
            public
          echo "assets tarball: $(du -sh "$TARBALL" | cut -f1)"

      - name: Sign frontend artifacts
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          BIN="lynx/dashboard/ui/lynx-dashboard-frontend-linux-${{ matrix.arch }}"
          ASSETS="lynx/dashboard/ui/lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$BIN"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$ASSETS"

      # --- Upload artifacts ---------------------------------------------------

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard-${{ matrix.arch }}
          path: |
            lynx-dashboard-backend-linux-${{ matrix.arch }}
            lynx-dashboard-backend-linux-${{ matrix.arch }}.sig
            lynx/dashboard/ui/lynx-dashboard-frontend-linux-${{ matrix.arch }}
            lynx/dashboard/ui/lynx-dashboard-frontend-linux-${{ matrix.arch }}.sig
            lynx/dashboard/ui/lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz
            lynx/dashboard/ui/lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz.sig
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            lynx-dashboard-backend-linux-x86_64 \
            lynx-dashboard-backend-linux-x86_64.sig \
            lynx-dashboard-backend-linux-arm64 \
            lynx-dashboard-backend-linux-arm64.sig \
            lynx-dashboard-frontend-linux-x86_64 \
            lynx-dashboard-frontend-linux-x86_64.sig \
            "lynx-dashboard-frontend-assets-linux-x86_64.tar.gz" \
            "lynx-dashboard-frontend-assets-linux-x86_64.tar.gz.sig" \
            lynx-dashboard-frontend-linux-arm64 \
            lynx-dashboard-frontend-linux-arm64.sig \
            "lynx-dashboard-frontend-assets-linux-arm64.tar.gz" \
            "lynx-dashboard-frontend-assets-linux-arm64.tar.gz.sig"
