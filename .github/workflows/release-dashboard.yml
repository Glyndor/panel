name: release-dashboard

on:
  push:
    tags:
      - "dashboard@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. dashboard@1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    name: Verify sqlx cache
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx_ci
          POSTGRES_PASSWORD: lynx_ci
          POSTGRES_DB: lynx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        env:
          DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci
        run: sqlx migrate run --source dashboard/server/migrations

      - name: Verify sqlx cache is up-to-date
        working-directory: lynx/dashboard/server
        env:
          DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci
        run: cargo sqlx prepare --check

  ci-server:
    name: CI server (Rust)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx_ci
          POSTGRES_PASSWORD: lynx_ci
          POSTGRES_DB: lynx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: lynx

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run migrations
        run: sqlx migrate run --source dashboard/server/migrations

      - name: fmt
        run: cargo fmt --package lynx-dashboard-server -- --check

      - name: clippy
        run: cargo clippy --package lynx-dashboard-server -- -D warnings

      - name: test
        run: cargo test --package lynx-dashboard-server -- --test-threads=1

      - name: audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  ci-ui:
    name: CI UI (frontend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lynx/dashboard/ui

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: test
        run: bun run test

      - name: audit
        run: bun audit --audit-level high

  build:
    name: Build ${{ matrix.arch }}
    needs: [prepare, ci-server, ci-ui]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust-target: x86_64-unknown-linux-musl
            bun-target: bun-linux-x64-musl
            use_cross: false

          - arch: arm64
            rust-target: aarch64-unknown-linux-musl
            bun-target: bun-linux-arm64-musl
            use_cross: true

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # --- Rust backend -------------------------------------------------------

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: lynx

      - name: Install musl toolchain (x86_64)
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get install -y musl-tools

      - name: Install cross (arm64)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build backend (musl static)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release \
              --package lynx-dashboard-server \
              --target ${{ matrix.rust-target }}
          else
            cargo build --release \
              --package lynx-dashboard-server \
              --target ${{ matrix.rust-target }}
          fi
        env:
          SQLX_OFFLINE: "true"

      - name: Sign backend binary
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          pip install --quiet cryptography
          BINARY="lynx/target/${{ matrix.rust-target }}/release/lynx-dashboard-server"
          ARTIFACT="lynx-dashboard-backend-linux-${{ matrix.arch }}"
          cp "$BINARY" "$ARTIFACT"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$ARTIFACT"

      # --- Frontend -----------------------------------------------------------

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install frontend deps
        working-directory: lynx/dashboard/ui
        run: bun install --frozen-lockfile

      - name: Build Next.js (standalone)
        working-directory: lynx/dashboard/ui
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Copy static assets into standalone
        working-directory: lynx/dashboard/ui
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Patch server.js for portable __dirname
        working-directory: lynx/dashboard/ui
        run: |
          # bun --compile embeds the compile-time __dirname (CI path) into the binary.
          # At runtime on the deployment server that path does not exist, causing chdir to fail.
          # Fix: shadow __dirname with a version that falls back to the binary's own directory
          # when the compile-time path is absent from disk.
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('.next/standalone/server.js', 'utf8');
          content = content.replace(
            \"const path = require('path')\",
            \"const path = require('path')\\nconst __dirname = require('fs').existsSync(__dirname) ? __dirname : path.dirname(process.execPath)\"
          );
          fs.writeFileSync('.next/standalone/server.js', content);
          process.stdout.write('server.js patched: __dirname resolves to binary directory on deployment\\n');
          "

      - name: Compile standalone binary
        working-directory: lynx/dashboard/ui
        run: |
          # --packages=external + --compile-autoload-package-json: packages are resolved from the
          # filesystem at runtime. The binary must be deployed alongside the standalone directory
          # (node_modules/ and .next/server/ from the assets tarball).
          bun build --compile \
            --target ${{ matrix.bun-target }} \
            --define 'process.env.NODE_ENV="production"' \
            --packages=external \
            --compile-autoload-package-json \
            .next/standalone/server.js \
            --outfile "lynx-dashboard-frontend-linux-${{ matrix.arch }}"

      - name: Bundle static assets
        working-directory: lynx/dashboard/ui
        run: |
          # Full standalone: node_modules/ + .next/ (server chunks + static + manifests) + public/
          # Binary must be extracted into this same directory at deployment time.
          TARBALL="lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" -C .next/standalone .
          echo "assets tarball: $(du -sh "$TARBALL" | cut -f1)"

      - name: Sign frontend artifacts
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          cp "lynx/dashboard/ui/lynx-dashboard-frontend-linux-${{ matrix.arch }}" .
          cp "lynx/dashboard/ui/lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz" .
          BIN="lynx-dashboard-frontend-linux-${{ matrix.arch }}"
          ASSETS="lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$BIN"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$ASSETS"

      # --- Upload artifacts ---------------------------------------------------

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-${{ matrix.arch }}
          path: |
            lynx-dashboard-backend-linux-${{ matrix.arch }}
            lynx-dashboard-backend-linux-${{ matrix.arch }}.sig
            lynx-dashboard-frontend-linux-${{ matrix.arch }}
            lynx-dashboard-frontend-linux-${{ matrix.arch }}.sig
            lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz
            lynx-dashboard-frontend-assets-linux-${{ matrix.arch }}.tar.gz.sig
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            lynx-dashboard-backend-linux-x86_64 \
            lynx-dashboard-backend-linux-x86_64.sig \
            lynx-dashboard-backend-linux-arm64 \
            lynx-dashboard-backend-linux-arm64.sig \
            lynx-dashboard-frontend-linux-x86_64 \
            lynx-dashboard-frontend-linux-x86_64.sig \
            "lynx-dashboard-frontend-assets-linux-x86_64.tar.gz" \
            "lynx-dashboard-frontend-assets-linux-x86_64.tar.gz.sig" \
            lynx-dashboard-frontend-linux-arm64 \
            lynx-dashboard-frontend-linux-arm64.sig \
            "lynx-dashboard-frontend-assets-linux-arm64.tar.gz" \
            "lynx-dashboard-frontend-assets-linux-arm64.tar.gz.sig"
