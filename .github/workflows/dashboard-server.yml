name: dashboard-server

on:
  push:
    branches: [main, develop]
    paths:
      - "lynx/dashboard/server/**"
      - "lynx/Cargo.toml"
      - "lynx/Cargo.lock"
      - ".github/workflows/dashboard-server.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "lynx/dashboard/server/**"
      - "lynx/Cargo.toml"
      - "lynx/Cargo.lock"
      - ".github/workflows/dashboard-server.yml"

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lynx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: fmt
        run: cargo fmt --package lynx-dashboard-server -- --check

  audit-urls:
    name: Audit download URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check download URLs are from allowed domains
        run: python3 .github/scripts/audit-urls.py

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lynx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lynx
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx_ci
          POSTGRES_PASSWORD: lynx_ci
          POSTGRES_DB: lynx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            lynx/target
          key: rust-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-${{ github.job }}-${{ runner.os }}-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        run: sqlx migrate run --source dashboard/server/migrations

      - name: check
        run: cargo check --package lynx-dashboard-server

      - name: clippy
        run: cargo clippy --package lynx-dashboard-server -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lynx
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx_ci
          POSTGRES_PASSWORD: lynx_ci
          POSTGRES_DB: lynx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            lynx/target
          key: rust-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-${{ github.job }}-${{ runner.os }}-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        run: sqlx migrate run --source dashboard/server/migrations
        env:
          DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci

      - name: test
        run: cargo test --package lynx-dashboard-server -- --test-threads=1
        env:
          DATABASE_URL: postgres://lynx_ci:lynx_ci@localhost:5432/lynx_ci
          REDIS_URL: redis://localhost:6379
