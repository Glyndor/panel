name: Lint shell scripts

on:
  push:
    branches:
      - develop
    paths:
      - "**.sh"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Syntax check (bash -n)
        run: |
          failed=0
          for f in \
            install.sh \
            scripts/detect-os.sh \
            scripts/remove-docker.sh \
            scripts/remove-firewall.sh \
            scripts/install-podman.sh \
            scripts/install-nftables.sh \
            lynx/dashboard/setup-dashboard.sh \
            lynx/dashboard/update-dashboard.sh
          do
            if bash -n "$f"; then
              echo "OK  $f"
            else
              echo "ERR $f"
              failed=$((failed + 1))
            fi
          done
          exit "$failed"

      - name: Install shellcheck
        run: |
          VERSION="0.10.0"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${VERSION}/shellcheck-v${VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ --strip-components=1 -C /usr/local/bin shellcheck-v${VERSION}/shellcheck
          shellcheck --version

      - name: Run shellcheck
        run: bash scripts/lint.sh
