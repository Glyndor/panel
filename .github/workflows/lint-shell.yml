name: Lint shell scripts

on:
  push:
    branches:
      - develop
    paths:
      - "**.sh"
  pull_request:
    branches:
      - main
    paths:
      - "**.sh"

permissions:
  contents: read
  security-events: write

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run shellcheck
        run: bash scripts/lint.sh
