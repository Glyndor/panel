name: Lint shell scripts

on:
  push:
    branches:
      - develop
    paths:
      - "**.sh"
  pull_request:
    branches:
      - main
    paths:
      - "**.sh"

permissions:
  contents: read
  security-events: write

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        run: bash scripts/lint.sh
