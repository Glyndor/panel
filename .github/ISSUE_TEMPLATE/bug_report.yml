name: Bug report
description: Report a bug or unexpected behavior in Lynx.
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to avoid duplicates.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dashboard
        - Agent (file it in Glyndor/panel-agent instead)
        - Installer
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, Debian 12, Fedora 40
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Lynx version
      placeholder: e.g. dashboard@1.0.0 / agent@1.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run install.sh
        2. Select option 1
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
