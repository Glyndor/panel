services:
  postgres:
    image: docker.io/library/postgres:18
    environment:
      - POSTGRES_USER=lynx
      - POSTGRES_DB=lynx_dashboard
      - POSTGRES_PASSWORD=lynx_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lynx -d lynx_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/library/redis:8-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
